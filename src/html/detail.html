<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reward Stamp</title>
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" href="../images/favicon.png" type="image/png">
</head>

<body>
  <section id="bg" class="list-box">
    <div class="inner comm">
      <div class="header">
        <h1 class="head-title">Reward Stamp</h1>
        <nav>
          <ul class="gnb">
            <li><a href="./list.html">List</a></li>
          </ul>
        </nav>
        <button type="button" class="logout-btn" data-logout>Logout</button>
      </div>
      <div class="detail-box">
        <span class="date" id="detail-date"></span>
        <div class="mv-detail">
          <div class="mv-img">
            <figure><img id="detail-image" src="" alt=""></figure>
            <h2 class="mv-title" id="detail-title"></h2>
          </div>
          <div class="comment-box">
            <ul class="comment-list" id="comment-list"></ul>
            <form action="#" id="comment-form">
              <textarea name="comment" id="comment" placeholder="Leave a comment ..."></textarea>
              <button type="submit">Send</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>

  <script type="module" src="../js/detail.js"></script>
</body>

</html>

<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reward Stamp</title>
  <link rel="stylesheet" href="../css/reset.css">
  <link rel="stylesheet" href="../css/style.css">
  <link rel="icon" href="../images/favicon.png" type="image/png">
</head>

<body>
  <section id="bg" class="login-box">
    <div class="inner">
      <h1 class="title">Reward Stamp</h1>
      <form action="#" class="login" id="login-form">
        <div class="user-input">
          <label for="userId">
            <input name="userId" type="text" id="userId" placeholder="Id ...">
          </label>
          <label for="userPw">
            <input name="userPw" type="password" id="userPw" placeholder="Password ...">
          </label>
        </div>
        <button type="submit">Claim Your Praise</button>
      </form>
    </div>
  </section>
  <script type="module" src="../js/login.js"></script>
</body>

</html>
